<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFFApa PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0b0d12;
  --card:#171b24;
  --border:#2a2f3a;
  --text:#e8ecf1;
  --sub:#8b93a7;
  --accent:#5ad1ff;
  --accent-soft:#5ad1ff22;
}

body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#141922,#090b10);
  color:var(--text);
  max-width:900px;
  margin:auto;
  padding:30px 20px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

h1 span{color:var(--accent)}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
}

.card h3{
  color:var(--sub);
  margin-bottom:10px;
}

input, textarea{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0c0f14;
  color:var(--text);
  margin-top:10px;
}

input:focus, textarea:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-soft);
}

button{
  margin-top:12px;
  padding:12px;
  width:100%;
  border-radius:10px;
  border:1px solid var(--accent);
  background:transparent;
  color:var(--accent);
  cursor:pointer;
}

button:hover{
  background:var(--accent);
  color:#000;
}

.ref{
  margin-bottom:14px;
  padding:14px;
  border-left:3px solid var(--accent);
  background:#0c0f14;
  border-radius:8px;
  line-height:1.7;
  text-indent:-10px;
}
</style>
</head>

<body>

<h1>OFF<span>Apa</span> PRO</h1>

<div class="card">
<h3>🔗 Link / DOI</h3>
<input id="url" placeholder="Pega título o DOI">
<button onclick="generar()">Generar cita</button>
</div>

<div class="card">
<h3>📝 Texto</h3>
<textarea id="texto" placeholder="Pega texto aquí"></textarea>
<button onclick="generarDesdeTexto()">Analizar texto</button>
</div>

<div class="card">
<h3>📄 PDF</h3>
<input type="file" id="pdfFile">
<button onclick="leerPDF()">Analizar PDF</button>
</div>

<div class="card">
<h3>📚 Bibliografía</h3>
<div id="resultado"></div>
<button onclick="copiar()">Copiar</button>
<button onclick="exportarWord()">Exportar Word</button>
</div>

<script>

let referencias = [];

function limpiarTexto(t){
 return t.replace(/\s+/g," ").trim();
}

// 🔥 FORMATO APA
function formatearAPA({autores,año,titulo,fuente=""}){

 autores = autores.map(n=>{
   let p=n.split(" ");
   let apellido=p.pop();
   let ini=p.map(x=>x[0]+".").join(" ");
   return `${apellido}, ${ini}`;
 });

 if(autores.length>1){
   let u=autores.pop();
   autores=autores.join(", ")+" & "+u;
 }else{
   autores=autores[0];
 }

 return `${autores} (${año}). ${titulo}. ${fuente}`;
}

// 📚 AGREGAR
function agregar(c){
 if(!referencias.includes(c)) referencias.push(c);
 mostrar();
}

// 📚 MOSTRAR
function mostrar(){
 referencias.sort((a,b)=>a.localeCompare(b));
 document.getElementById("resultado").innerHTML=
 referencias.map(r=>`<div class="ref">${r}</div>`).join("");
}

// 🔎 LINK
async function generar(){

 let q=document.getElementById("url").value;

 let r=await fetch(`https://api.crossref.org/works?query=${encodeURIComponent(q)}&rows=1`);
 let d=await r.json();

 if(d.message.items.length){
   let i=d.message.items[0];

   let autores=i.author?.map(a=>`${a.given} ${a.family}`)||["Autor"];
   let año=i.issued?.["date-parts"]?.[0]?.[0]||"s.f.";
   let titulo=i.title?.[0]||"Sin título";
   let fuente=i["container-title"]?.[0]||"";

   agregar(formatearAPA({autores,año,titulo,fuente}));
 }
}

// 🧠 TEXTO IA SIMULADA
function generarDesdeTexto(){

 let t = limpiarTexto(document.getElementById("texto").value);

 if(!t){
   alert("Pega un texto primero");
   return;
 }

 t = t.replace(/\n/g," ");

 let autores = [];

 let match1 = t.match(/([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+),\s([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+)/g);
 let match2 = t.match(/([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+)\s([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+)/g);

 if(match1){
   autores = match1.map(a=>{
     let p = a.split(",");
     return `${p[1].trim()} ${p[0].trim()}`;
   });
 }
 else if(match2){
   autores = match2.slice(0,3);
 }

 if(autores.length === 0){
   autores = ["Autor"];
 }

 let añoMatch = t.match(/\b(19|20)\d{2}\b/);
 let año = añoMatch ? añoMatch[0] : "s.f.";

 let titulo = t.includes(".") ? t.split(".")[0] : t.slice(0,120);

 titulo = titulo.trim();

 let cita = formatearAPA({
   autores: autores.slice(0,3),
   año,
   titulo
 });

 agregar(cita);
}

// 📄 PDF
async function leerPDF(){

 let f=document.getElementById("pdfFile").files[0];
 if(!f)return;

 let reader=new FileReader();

 reader.onload=async function(){
   let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

   let txt="";
   for(let i=1;i<=Math.min(5,pdf.numPages);i++){
     let p=await pdf.getPage(i);
     let c=await p.getTextContent();
     c.items.forEach(it=>txt+=it.str+" ");
   }

   analizarPDF(txt);
 };

 reader.readAsArrayBuffer(f);
}

function analizarPDF(t){

 t=limpiarTexto(t);

 let autores=t.match(/[A-Z][a-z]+ [A-Z][a-z]+/g)?.slice(0,3)||["Autor"];
 let año=t.match(/\b(19|20)\d{2}\b/)?.[0]||"s.f.";
 let titulo=t.split(".")[0];

 agregar(formatearAPA({autores,año,titulo,fuente:"PDF"}));
}

// 📋 COPIAR
function copiar(){
 navigator.clipboard.writeText(referencias.join("\n\n"));
 alert("Copiado");
}

// 📤 WORD
function exportarWord(){
 let blob=new Blob([referencias.join("\n\n")],{type:"application/msword"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="bibliografia.doc";
 a.click();
}

</script>

</body>
</html>
