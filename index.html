<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFFApa Premium</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

.container{
  max-width:800px;
  margin:auto;
  padding:30px;
}

.logo{
  text-align:center;
  font-size:40px;
  margin-bottom:30px;
}
.logo .off{color:#00ffff}
.logo .apa{color:#fff}

.card{
  background:#111;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#00ffff;
  border:none;
  cursor:pointer;
}

#resultado{
  margin-top:10px;
  padding:15px;
  background:#000;
  min-height:80px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<span class="off">OFF</span><span class="apa">Apa</span>
</div>

<div class="card">
<h2>Generar cita</h2>
<input id="input" placeholder="DOI, link o título">
<button onclick="generar()">Generar</button>
</div>

<div class="card">
<h2>Resultado</h2>
<div id="resultado"></div>
<button onclick="copiar()">Copiar</button>
</div>

</div>

<script>
function formatearAPA(item){
 let autor = item.author?.map(a=>a.family).join(", ") || "Autor";
 let año = item.issued?.["date-parts"]?.[0]?.[0] || "s.f.";
 let titulo = item.title?.[0] || "Sin título";
 let revista = item["container-title"]?.[0] || "";
 let doi = item.DOI ? "https://doi.org/"+item.DOI : "";

 return `${autor} (${año}). ${titulo}. ${revista}. ${doi}`;
}

// 🔥 FUNCIÓN QUE SI FUNCIONA
async function fetchCrossRef(url){
 let proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
 let res = await fetch(proxy);
 return await res.json();
}

async function generar(){
 let input = document.getElementById("input").value.trim();
 let resultado = document.getElementById("resultado");

 if(!input){
   resultado.innerText="⚠️ Escribe algo";
   return;
 }

 resultado.innerText="⏳ Buscando...";

 try{
   let doi="";

   if(input.includes("doi.org")){
     doi = input.split("doi.org/")[1];
   } else if(input.startsWith("10.")){
     doi = input;
   }

   // 🔹 1. Intentar DOI
   if(doi){
     let data = await fetchCrossRef(`https://api.crossref.org/works/${doi}`);

     if(data.message){
       resultado.innerText = formatearAPA(data.message);
       return;
     }
   }

   // 🔹 2. Buscar por texto
   let data = await fetchCrossRef(`https://api.crossref.org/works?query=${encodeURIComponent(input)}&rows=1`);

   if(data.message.items.length > 0){
     resultado.innerText = formatearAPA(data.message.items[0]);
   } else {
     resultado.innerText = "❌ No encontrado";
   }

 }catch(e){
   console.error(e);
   resultado.innerText="❌ Error real de conexión";
 }
}

function copiar(){
 let texto=document.getElementById("resultado").innerText;
 navigator.clipboard.writeText(texto);
 alert("Copiado");
}
</script>

</body>
</html>
