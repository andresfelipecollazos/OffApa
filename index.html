<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFFApa PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>

/* 🔥 RESET */
*{box-sizing:border-box;margin:0;padding:0}

/* 🎨 VARIABLES */
:root{
  --bg:#0b0d12;
  --panel:#11151c;
  --card:#171b24;
  --border:#2a2f3a;
  --text:#e8ecf1;
  --sub:#8b93a7;
  --accent:#5ad1ff;
  --accent-soft:#5ad1ff22;
}

/* 🌙 BODY */
body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#141922,#090b10);
  color:var(--text);
  display:flex;
  min-height:100vh;
}

/* 🧭 SIDEBAR */
.sidebar{
  width:220px;
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:20px;
}

.logo{
  font-size:20px;
  font-weight:600;
  margin-bottom:30px;
}

.logo span{
  color:var(--accent);
}

.menu button{
  width:100%;
  text-align:left;
  background:none;
  border:none;
  color:var(--sub);
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:8px;
}

.menu button:hover{
  background:var(--accent-soft);
  color:var(--text);
}

/* 📦 MAIN */
.main{
  flex:1;
  padding:30px;
}

/* 📦 CARDS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
  transition:0.3s;
}

.card:hover{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent-soft);
}

.card h3{
  color:var(--sub);
  font-size:15px;
  margin-bottom:10px;
}

/* ✍ INPUTS */
input, textarea{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0c0f14;
  color:var(--text);
  margin-top:10px;
}

input:focus, textarea:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-soft);
}

/* 🔘 BOTONES */
button{
  margin-top:12px;
  padding:12px;
  width:100%;
  border-radius:10px;
  border:1px solid var(--accent);
  background:transparent;
  color:var(--accent);
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  background:var(--accent);
  color:#000;
}

/* 📚 REFERENCIAS */
.ref{
  margin-bottom:14px;
  padding:14px;
  border-left:3px solid var(--accent);
  background:#0c0f14;
  border-radius:8px;
  line-height:1.7;
  text-indent:-10px;
}

/* ✨ ANIMACIÓN */
.card{
  animation:fade 0.5s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<!-- 🧭 SIDEBAR -->
<div class="sidebar">
  <div class="logo">OFF<span>Apa</span></div>

  <div class="menu">
    <button>Generar cita</button>
    <button>Texto</button>
    <button>PDF</button>
    <button>Bibliografía</button>
  </div>
</div>

<!-- 📦 MAIN -->
<div class="main">

<div class="card">
<h3>🔗 Link / DOI</h3>
<input id="url" placeholder="Pega título o DOI">
<button onclick="generar()">Generar cita</button>
</div>

<div class="card">
<h3>📝 Texto</h3>
<textarea id="texto"></textarea>
<button onclick="generarDesdeTexto()">Analizar texto</button>
</div>

<div class="card">
<h3>📄 PDF</h3>
<input type="file" id="pdfFile">
<button onclick="leerPDF()">Analizar PDF</button>
</div>

<div class="card">
<h3>📚 Bibliografía</h3>
<div id="resultado"></div>
<button onclick="copiar()">Copiar</button>
<button onclick="exportarWord()">Exportar Word</button>
</div>

</div>

<script>

let referencias = [];

function limpiarTexto(t){
 return t.replace(/\s+/g," ").trim();
}

function formatearAPA({autores,año,titulo,fuente=""}){

 autores = autores.map(n=>{
   let p=n.split(" ");
   let apellido=p.pop();
   let ini=p.map(x=>x[0]+".").join(" ");
   return `${apellido}, ${ini}`;
 });

 if(autores.length>1){
   let u=autores.pop();
   autores=autores.join(", ")+" & "+u;
 }else{
   autores=autores[0];
 }

 return `${autores} (${año}). ${titulo}. ${fuente}`;
}

function agregar(c){
 if(!referencias.includes(c)) referencias.push(c);
 mostrar();
}

function mostrar(){
 referencias.sort((a,b)=>a.localeCompare(b));
 document.getElementById("resultado").innerHTML=
 referencias.map(r=>`<div class="ref">${r}</div>`).join("");
}

async function generar(){
 let q=document.getElementById("url").value;

 let r=await fetch(`https://api.crossref.org/works?query=${encodeURIComponent(q)}&rows=1`);
 let d=await r.json();

 if(d.message.items.length){
   let i=d.message.items[0];

   let autores=i.author?.map(a=>`${a.given} ${a.family}`)||["Autor"];
   let año=i.issued?.["date-parts"]?.[0]?.[0]||"s.f.";
   let titulo=i.title?.[0]||"Sin título";
   let fuente=i["container-title"]?.[0]||"";

   agregar(formatearAPA({autores,año,titulo,fuente}));
 }
}

function generarDesdeTexto(){
 let t=limpiarTexto(document.getElementById("texto").value);

 let autores=t.match(/[A-Z][a-z]+ [A-Z][a-z]+/g)||["Autor"];
 let año=t.match(/\b(19|20)\d{2}\b/)?.[0]||"s.f.";
 let titulo=t.split(".")[0];

 agregar(formatearAPA({autores,año,titulo}));
}

async function leerPDF(){
 let f=document.getElementById("pdfFile").files[0];
 if(!f)return;

 let reader=new FileReader();

 reader.onload=async function(){
   let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

   let txt="";
   for(let i=1;i<=Math.min(5,pdf.numPages);i++){
     let p=await pdf.getPage(i);
     let c=await p.getTextContent();
     c.items.forEach(it=>txt+=it.str+" ");
   }

   analizarPDF(txt);
 };

 reader.readAsArrayBuffer(f);
}

function analizarPDF(t){

 t=limpiarTexto(t);

 let autores=t.match(/[A-Z][a-z]+ [A-Z][a-z]+/g)?.slice(0,3)||["Autor"];
 let año=t.match(/\b(19|20)\d{2}\b/)?.[0]||"s.f.";
 let titulo=t.split(".")[0];

 agregar(formatearAPA({autores,año,titulo,fuente:"PDF"}));
}

function copiar(){
 navigator.clipboard.writeText(referencias.join("\n\n"));
 alert("Copiado");
}

function exportarWord(){

 let blob=new Blob([referencias.join("\n\n")],{type:"application/msword"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="bibliografia.doc";
 a.click();
}

</script>

</body>
</html>
