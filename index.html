<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OffApa</title>

<!-- 🔐 SEGURIDAD -->
<meta http-equiv="Content-Security-Policy" content="
default-src 'self';
script-src 'self' https://cdnjs.cloudflare.com;
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src https://fonts.gstatic.com;
connect-src https://api.crossref.org;
img-src 'self' data:;
">

<meta name="author" content="OffApa">
<meta name="copyright" content="OffApa">

<!-- FAVICON -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'>
<rect width='200' height='200' fill='black'/>
<text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle'
font-size='48' fill='cyan' font-family='Arial' font-weight='bold'>OffApa</text>
</svg>">

<!-- FUENTES -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #000;
  margin: 0;
  color: #fff;
  user-select: none; /* evita copia */
}

/* CONTENEDOR */
.box {
  background: rgba(10,10,10,0.9);
  max-width: 750px;
  margin: 60px auto;
  padding: 30px;
  border-radius: 20px;
  border: 1px solid #111;
}

/* LOGO */
.logo {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 44px;
  text-align: center;
  color: #00ffff;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #00ffff; }
  to { text-shadow: 0 0 25px #00ffff; }
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #00ffff33;
  background: #000;
  color: #fff;
}

/* BOTONES */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #00ffff;
  background: transparent;
  color: #00ffff;
}

button:hover {
  background: #00ffff;
  color: #000;
}

/* RESULTADO */
#resultado {
  margin-top: 15px;
  padding: 15px;
  border: 1px solid #00ffff33;
  border-radius: 10px;
}

/* HISTORIAL */
li {
  border: 1px solid #00ffff33;
  padding: 10px;
  margin-top: 5px;
  border-radius: 10px;
}

/* FOOTER LEGAL */
.footer {
  text-align: center;
  font-size: 12px;
  color: #666;
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="box">

<h1 class="logo">OffApa</h1>

<input id="url" placeholder="Pega un link aquí">
<button onclick="generarDesdeLink()">⚡ Generar cita</button>

<p id="resultado"></p>

<h3>📚 Historial</h3>
<ul id="historial"></ul>
<button onclick="limpiarHistorial()">Limpiar historial</button>

<hr>

<textarea id="texto"></textarea>
<button onclick="generarDesdeTexto()">Generar desde texto</button>

<hr>

<input type="file" id="pdf">
<button onclick="leerPDF()">Leer PDF</button>

<div class="footer">
© 2026 OffApa. Todos los derechos reservados.<br>
Uso académico. El usuario es responsable del uso de las citas generadas.
</div>

</div>

<script>

// 🔐 BLOQUEOS BÁSICOS
document.addEventListener("contextmenu", e => e.preventDefault());

document.onkeydown = function(e) {
  if (e.keyCode == 123) return false;
  if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
};

// HISTORIAL
function guardarCita(cita) {
  let h = JSON.parse(sessionStorage.getItem("citas")) || [];
  h.unshift(cita);
  sessionStorage.setItem("citas", JSON.stringify(h));
  mostrarHistorial();
}

function mostrarHistorial() {
  let h = JSON.parse(sessionStorage.getItem("citas")) || [];
  let ul = document.getElementById("historial");
  ul.innerHTML = "";
  h.forEach(c => {
    let li = document.createElement("li");
    li.textContent = c;
    ul.appendChild(li);
  });
}

function limpiarHistorial() {
  sessionStorage.clear();
  mostrarHistorial();
}

// RESULTADO
function mostrarResultado(cita) {
  document.getElementById("resultado").textContent = cita;
  guardarCita(cita);
  navigator.clipboard.writeText(cita);
}

// TEXTO
function generarDesdeTexto() {
  let t = document.getElementById("texto").value;
  let autor = t.match(/([A-Z][a-z]+)/)?.[0] || "Autor";
  let año = t.match(/\d{4}/)?.[0] || "s.f.";
  mostrarResultado(`${autor} (${año}). Texto.`);
}

// LINK
async function generarDesdeLink() {
  let url = document.getElementById("url").value;
  let res = await fetch(`https://api.crossref.org/works?query=${url}`);
  let data = await res.json();
  let item = data.message.items[0];
  if(item){
    mostrarResultado(item.title[0]);
  }
}

// PDF
async function leerPDF() {
  let file = document.getElementById("pdf").files[0];
  let reader = new FileReader();
  reader.onload = async function() {
    let pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let page = await pdf.getPage(1);
    let text = await page.getTextContent();
    document.getElementById("texto").value = text.items.map(i=>i.str).join(" ");
  };
  reader.readAsArrayBuffer(file);
}

// BORRAR AL CERRAR
window.addEventListener("beforeunload", () => sessionStorage.clear());

mostrarHistorial();

</script>

</body>
</html>
