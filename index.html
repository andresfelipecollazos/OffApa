<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OffApa Premium</title>

<meta http-equiv="Content-Security-Policy" content="
default-src 'self';
script-src 'self' https://cdnjs.cloudflare.com;
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src https://fonts.gstatic.com;
connect-src https://api.crossref.org;
img-src 'self' data:;
">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
:root{
  --neon:#00ffff;
}

body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at top,#050505,#000);
  color:#fff;
}

.app{
  display:grid;
  grid-template-columns:250px 1fr;
  min-height:100vh;
}

.sidebar{
  background:rgba(10,10,10,0.95);
  border-right:1px solid #00ffff22;
  padding:20px;
  box-shadow:0 0 20px #00ffff22;
}

.logo{
  font-family:'Playfair Display';
  font-size:32px;
  color:var(--neon);
  text-shadow:0 0 10px var(--neon);
  margin-bottom:30px;
}

.menu button{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:none;
  border:1px solid #00ffff33;
  color:var(--neon);
  border-radius:10px;
}

.main{
  padding:30px;
}

.card{
  background:rgba(15,15,15,0.85);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 0 20px #00ffff22;
  border:1px solid #00ffff22;
  margin-bottom:20px;
}

h2{
  margin-top:0;
  color:var(--neon);
}

input,textarea{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #00ffff33;
  background:#000;
  color:var(--neon);
  box-shadow:0 0 10px #00ffff22 inset;
}

input:focus,textarea:focus{
  outline:none;
  box-shadow:0 0 15px var(--neon);
}

button.action{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid var(--neon);
  background:transparent;
  color:var(--neon);
  transition:0.3s;
}

button.action:hover{
  background:var(--neon);
  color:#000;
  box-shadow:0 0 20px var(--neon);
}

#resultado{
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  border:1px solid #00ffff33;
}

li{
  list-style:none;
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  border:1px solid #00ffff22;
}

</style>
</head>

<body>
<div class="app">

<div class="sidebar">
  <div class="logo">OffApa</div>
  <div class="menu">
    <button>Generador</button>
    <button>Historial</button>
  </div>
</div>

<div class="main">

<div class="card">
<h2>Generar desde link</h2>
<input id="url" placeholder="Pega link o DOI">
<button class="action" onclick="generarDesdeLink()">Generar cita</button>
</div>

<div class="card">
<h2>Resultado</h2>
<div id="resultado"></div>
<button class="action" onclick="copiar()">Copiar</button>
</div>

<div class="card">
<h2>Texto</h2>
<textarea id="texto"></textarea>
<button class="action" onclick="generarDesdeTexto()">Generar</button>
</div>

<div class="card">
<h2>PDF</h2>
<input type="file" id="pdf">
<button class="action" onclick="leerPDF()">Leer PDF</button>
</div>

<div class="card">
<h2>Historial</h2>
<ul id="historial"></ul>
<button class="action" onclick="limpiarHistorial()">Limpiar</button>
</div>

</div>
</div>

<script>

function formatearAPA(item){
 let autor=item.author?.map(a=>a.family).join(", ")||"Autor";
 let año=item.issued?.["date-parts"]?.[0]?.[0]||"s.f.";
 let titulo=item.title?.[0]||"Sin título";
 let revista=item["container-title"]?.[0]||"";
 return `${autor} (${año}). ${titulo}. ${revista}.`;
}

async function generarDesdeLink(){
 let url=document.getElementById("url").value;
 let res=await fetch(`https://api.crossref.org/works?query.bibliographic=${url}`);
 let data=await res.json();
 let item=data.message.items[0];
 if(item) mostrarResultado(formatearAPA(item));
}

function generarDesdeTexto(){
 let t=document.getElementById("texto").value;
 let autor=t.match(/[A-Z][a-z]+(?:\s[A-Z][a-z]+)*/)?.[0]||"Autor";
 let año=t.match(/\d{4}/)?.[0]||"s.f.";
 mostrarResultado(`${autor} (${año}). Texto.`);
}

async function leerPDF(){
 let file=document.getElementById("pdf").files[0];
 let reader=new FileReader();
 reader.onload=async function(){
 let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
 let full="";
 for(let i=1;i<=pdf.numPages;i++){
 let page=await pdf.getPage(i);
 let txt=await page.getTextContent();
 full+=txt.items.map(i=>i.str).join(" ")+" ";
 }
 document.getElementById("texto").value=full;
 };
 reader.readAsArrayBuffer(file);
}

function mostrarResultado(cita){
 document.getElementById("resultado").innerText=cita;
 guardar(cita);
}

function copiar(){
 navigator.clipboard.writeText(document.getElementById("resultado").innerText);
}

function guardar(c){
 let h=JSON.parse(localStorage.getItem("citas")||"[]");
 h.unshift(c);
 h=h.slice(0,20);
 localStorage.setItem("citas",JSON.stringify(h));
 mostrarHistorial();
}

function mostrarHistorial(){
 let h=JSON.parse(localStorage.getItem("citas")||"[]");
 let ul=document.getElementById("historial");
 ul.innerHTML="";
 h.forEach(c=>{
 let li=document.createElement("li");
 li.innerText=c;
 ul.appendChild(li);
 });
}

function limpiarHistorial(){
 localStorage.clear();
 mostrarHistorial();
}

mostrarHistorial();

</script>
</body>
</html>
