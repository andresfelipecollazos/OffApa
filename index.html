<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFFApa AI PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body{
 font-family:Inter;
 background:#0b0d12;
 color:#fff;
 max-width:900px;
 margin:auto;
 padding:30px;
}

.card{
 background:#171b24;
 padding:20px;
 border-radius:12px;
 margin-bottom:20px;
}

input,textarea{
 width:100%;
 padding:12px;
 margin-top:10px;
 background:#000;
 color:#fff;
 border:1px solid #333;
 border-radius:8px;
}

button{
 margin-top:10px;
 padding:12px;
 width:100%;
 border:1px solid #00ffff;
 color:#00ffff;
 background:none;
 border-radius:8px;
}

button:hover{
 background:#00ffff;
 color:#000;
}

.ref{
 margin:10px 0;
 padding:10px;
 border-left:3px solid #00ffff;
}
</style>
</head>

<body>

<h1>OFFApa AI PRO</h1>

<div class="card">
<input id="url" placeholder="DOI, título o link">
<button onclick="generar()">Generar cita directa</button>
</div>

<div class="card">
<textarea id="texto" placeholder="Pega un párrafo para encontrar su fuente"></textarea>
<button onclick="generarDesdeTexto()">Detectar documento automáticamente</button>
</div>

<div class="card">
<input type="file" id="pdfFile">
<button onclick="leerPDF()">Analizar PDF</button>
</div>

<div class="card" id="bibliografia">
<h3>Bibliografía</h3>
<div id="resultado"></div>
<button onclick="copiar()">Copiar</button>
<button onclick="limpiar()">Limpiar</button>
</div>

<script>

let referencias = JSON.parse(localStorage.getItem("refs")||"[]");

/* ---------- UTILIDADES ---------- */

function guardar(){
 localStorage.setItem("refs",JSON.stringify(referencias));
}

function limpiarCampos(){
 url.value="";
 texto.value="";
 pdfFile.value="";
 url.focus();
}

function scroll(){
 document.getElementById("bibliografia").scrollIntoView({behavior:"smooth"});
}

function normalizar(t){
 return t.toLowerCase().replace(/[^\w\s]/g,"");
}

function similitud(a,b){
 let A = normalizar(a).split(" ");
 let B = normalizar(b).split(" ");
 let comunes = A.filter(x=>B.includes(x));
 return comunes.length / Math.max(A.length,1);
}

/* ---------- DOI ---------- */

function detectarDOI(t){
 let doi = t.match(/10.\d{4,9}\/[-._;()/:A-Z0-9]+/i);
 return doi ? doi[0] : null;
}

/* ---------- FORMATO APA ---------- */

function formatearAPA(item){

 let autores = item.author?.map(a=>{
   let apellido = a.family || "";
   let inicial = a.given ? a.given[0]+"." : "";
   return `${apellido}, ${inicial}`;
 }) || ["Autor"];

 if(autores.length > 1){
   let ultimo = autores.pop();
   autores = autores.join(", ") + " & " + ultimo;
 }else{
   autores = autores[0];
 }

 let año = item.issued?.["date-parts"]?.[0]?.[0] || "s.f.";
 let titulo = item.title?.[0] || "Sin título";
 let fuente = item["container-title"]?.[0] || "";

 return `${autores} (${año}). ${titulo}. ${fuente}.`;
}

/* ---------- MOSTRAR ---------- */

function mostrar(){
 resultado.innerHTML = referencias.map(r=>`<div class="ref">${r}</div>`).join("");
}

mostrar();

/* ---------- AGREGAR ---------- */

function agregar(c){
 if(!referencias.includes(c)){
   referencias.unshift(c);
   guardar();
 }
 mostrar();
 scroll();
 limpiarCampos();
}

/* ---------- BUSQUEDA MULTI MOTOR ---------- */

async function buscarDocumentos(query){

 let candidatos = [];

 /* 🔥 OPENALEX */
 try{
   let r = await fetch(`https://api.openalex.org/works?search=${encodeURIComponent(query)}&per-page=5`);
   let d = await r.json();

   d.results.forEach(w=>{
     candidatos.push({
       titulo:w.title,
       autores:(w.authorships||[]).map(a=>a.author.display_name).join(" "),
       data:{
         title:[w.title],
         author:(w.authorships||[]).map(a=>{
           let n=a.author.display_name.split(" ");
           return {given:n[0],family:n.slice(1).join(" ")};
         }),
         issued:{"date-parts":[[w.publication_year]]},
         "container-title":[w.host_venue?.display_name||""]
       }
     });
   });
 }catch(e){}

 /* 🔥 SEMANTIC */
 try{
   let r = await fetch(`https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(query)}&limit=5&fields=title,authors,year,venue`);
   let d = await r.json();

   d.data.forEach(p=>{
     candidatos.push({
       titulo:p.title,
       autores:p.authors.map(a=>a.name).join(" "),
       data:{
         title:[p.title],
         author:p.authors.map(a=>{
           let n=a.name.split(" ");
           return {given:n[0],family:n.slice(1).join(" ")};
         }),
         issued:{"date-parts":[[p.year]]},
         "container-title":[p.venue]
       }
     });
   });
 }catch(e){}

 return candidatos;
}

/* ---------- DETECTAR DOCUMENTO DESDE TEXTO ---------- */

async function generarDesdeTexto(){

 let texto = document.getElementById("texto").value.trim();
 if(!texto) return alert("Pega un texto");

 let doi = detectarDOI(texto);
 if(doi){
   url.value = doi;
   generar();
   return;
 }

 // 🔥 FRASE CLAVE
 let fragmento = texto.split(" ").slice(0,30).join(" ");

 let candidatos = await buscarDocumentos(fragmento);

 if(!candidatos.length){
   alert("No se encontró el documento");
   return;
 }

 // 🔥 COMPARACIÓN
 candidatos.forEach(c=>{
   c.score = similitud(texto, c.titulo + " " + c.autores);
 });

 candidatos.sort((a,b)=>b.score - a.score);

 let mejor = candidatos[0];

 console.log("Documento encontrado:", mejor);

 agregar(formatearAPA(mejor.data));
}

/* ---------- GENERAR DIRECTO ---------- */

async function generar(){

 let q = url.value;

 let doi = detectarDOI(q);

 let endpoint = doi
   ? `https://api.crossref.org/works/${doi}`
   : `https://api.crossref.org/works?query=${encodeURIComponent(q)}&rows=1`;

 let r = await fetch(endpoint);
 let d = await r.json();

 let item = doi ? d.message : d.message.items[0];

 if(item){
   agregar(formatearAPA(item));
 }
}

/* ---------- PDF ---------- */

async function leerPDF(){

 let f = pdfFile.files[0];
 if(!f) return;

 let reader = new FileReader();

 reader.onload = async function(){

   let pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

   let txt = "";

   for(let i=1;i<=Math.min(5,pdf.numPages);i++){
     let p = await pdf.getPage(i);
     let c = await p.getTextContent();
     c.items.forEach(it=>txt += it.str + " ");
   }

   texto.value = txt;
   generarDesdeTexto();
 };

 reader.readAsArrayBuffer(f);
}

/* ---------- EXTRA ---------- */

function copiar(){
 navigator.clipboard.writeText(referencias.join("\n\n"));
}

function limpiar(){
 if(confirm("Borrar todo?")){
   referencias=[];
   guardar();
   mostrar();
 }
}

</script>

</body>
</html>
