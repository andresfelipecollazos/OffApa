<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OffApa Premium</title>

<meta http-equiv="Content-Security-Policy" content="
default-src 'self';
script-src 'self' https://cdnjs.cloudflare.com;
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src https://fonts.gstatic.com;
connect-src https://api.crossref.org;
img-src 'self' data:;
">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
:root{
  --neon:#00ffff;
  --soft:#00ffff33;
}

body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle,#050505,#000);
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

.logo{
  font-family:'Playfair Display';
  font-style:italic;
  font-size:48px;
  text-align:center;
  color:var(--neon);
  text-shadow:0 0 10px var(--neon),0 0 40px var(--neon);
  margin-bottom:30px;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px var(--neon);} 
  to{ text-shadow:0 0 40px var(--neon);} 
}

.card{
  background:rgba(15,15,15,0.9);
  border-radius:18px;
  padding:25px;
  margin-bottom:25px;
  border:1px solid var(--soft);
  box-shadow:0 0 15px #00ffff22;
}

.card h2{
  margin:0 0 15px;
  color:var(--neon);
  border-bottom:1px solid var(--soft);
  padding-bottom:8px;
}

/* tamaños especiales */
.large textarea{
  height:140px;
}

.xlarge{
  min-height:150px;
}

input,textarea{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid var(--soft);
  background:#000;
  color:var(--neon);
  box-shadow:inset 0 0 10px #00ffff22;
}

button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:1px solid var(--neon);
  background:transparent;
  color:var(--neon);
  transition:0.3s;
}

button:hover{
  background:var(--neon);
  color:#000;
  box-shadow:0 0 20px var(--neon);
}

#resultado{
  margin-top:10px;
  padding:20px;
  border-radius:12px;
  border:1px solid var(--soft);
  min-height:120px;
  box-shadow:inset 0 0 10px #00ffff22;
}

li{
  list-style:none;
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--soft);
}

</style>
</head>

<body>
<div class="container">

<div class="logo">OffApa</div>

<!-- 1️⃣ LINK -->
<div class="card">
<h2>🔗 Generar desde link</h2>
<input id="url" placeholder="Pega link o DOI">
<button onclick="generarDesdeLink()">Generar cita</button>
</div>

<!-- 2️⃣ TEXTO GRANDE -->
<div class="card large">
<h2>📝 Copiar párrafo de un texto</h2>
<textarea id="texto" placeholder="Pega aquí el texto..."></textarea>
<button onclick="generarDesdeTexto()">Generar desde texto</button>
</div>

<!-- 3️⃣ RESULTADO MÁS GRANDE -->
<div class="card xlarge">
<h2>📄 Resultado</h2>
<div id="resultado"></div>
<button onclick="copiar()">Copiar cita</button>
</div>

<!-- 4️⃣ HISTORIAL -->
<div class="card">
<h2>📚 Historial</h2>
<ul id="historial"></ul>
<button onclick="limpiarHistorial()">Limpiar historial</button>
</div>

</div>

<script>

function formatearAPA(item){
 let autor=item.author?.map(a=>a.family).join(", ")||"Autor";
 let año=item.issued?.["date-parts"]?.[0]?.[0]||"s.f.";
 let titulo=item.title?.[0]||"Sin título";
 let revista=item["container-title"]?.[0]||"";
 return `${autor} (${año}). ${titulo}. ${revista}.`;
}

async function generarDesdeLink(){
 let url=document.getElementById("url").value;
 let res=await fetch(`https://api.crossref.org/works?query.bibliographic=${url}`);
 let data=await res.json();
 let item=data.message.items[0];
 if(item) mostrarResultado(formatearAPA(item));
}

function generarDesdeTexto(){
 let t=document.getElementById("texto").value;
 let autor=t.match(/[A-Z][a-z]+(?:\s[A-Z][a-z]+)*/)?.[0]||"Autor";
 let año=t.match(/\d{4}/)?.[0]||"s.f.";
 mostrarResultado(`${autor} (${año}). Texto.`);
}

function mostrarResultado(cita){
 document.getElementById("resultado").innerText=cita;
 guardar(cita);
}

function copiar(){
 navigator.clipboard.writeText(document.getElementById("resultado").innerText);
}

function guardar(c){
 let h=JSON.parse(localStorage.getItem("citas")||"[]");
 h.unshift(c);
 h=h.slice(0,20);
 localStorage.setItem("citas",JSON.stringify(h));
 mostrarHistorial();
}

function mostrarHistorial(){
 let h=JSON.parse(localStorage.getItem("citas")||"[]");
 let ul=document.getElementById("historial");
 ul.innerHTML="";
 h.forEach(c=>{
 let li=document.createElement("li");
 li.innerText=c;
 ul.appendChild(li);
 });
}

function limpiarHistorial(){
 localStorage.clear();
 mostrarHistorial();
}

mostrarHistorial();

</script>
</body>
</html>
